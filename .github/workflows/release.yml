name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Get version from tag
      id: tag_name
      shell: pwsh
      run: |
        $tag = $env:GITHUB_REF -replace 'refs/tags/', ''
        $version = $tag -replace '^v', ''
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        echo "TAG=$tag" >> $env:GITHUB_OUTPUT

    - name: Restore dependencies
      run: dotnet restore src/ECMABasic.sln

    - name: Build
      run: dotnet build src/ECMABasic.sln --configuration Release --no-restore

    - name: Test
      run: dotnet test src/ECMABasic.sln --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage"

    - name: Check Code Coverage
      shell: pwsh
      run: |
        dotnet tool install --global dotnet-reportgenerator-globaltool
        reportgenerator -reports:**/coverage.cobertura.xml -targetdir:coverage-report -reporttypes:Cobertura

        [xml]$coverage = Get-Content coverage-report/Cobertura.xml
        $lineCoverage = [math]::Round([decimal]$coverage.coverage.'line-rate' * 100, 2)
        Write-Host "Line Coverage: $lineCoverage%"

        if ($lineCoverage -lt 80) {
          Write-Error "Cannot release: Code coverage ($lineCoverage%) is below 80%"
          exit 1
        }

    - name: Publish ECMABasic55
      run: |
        dotnet publish src/ECMABasic55/ECMABasic55.csproj `
          --configuration Release `
          --output publish/ecmabasic55-win-x64 `
          --runtime win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:PublishTrimmed=true

    - name: Create ZIP Archive
      shell: pwsh
      run: |
        Compress-Archive -Path publish/ecmabasic55-win-x64/* -DestinationPath ecmabasic55-win-x64.zip

    - name: Extract Release Notes
      id: extract_notes
      shell: pwsh
      run: |
        $changelog = Get-Content CHANGELOG.md -Raw
        $version = "${{ steps.tag_name.outputs.VERSION }}"

        # Extract notes for this version
        if ($changelog -match "(?s)## \[$version\].*?\n(.*?)(?=\n## \[|$)") {
          $notes = $matches[1].Trim()
          # Escape for GitHub Actions
          $notes = $notes -replace '%','%25' -replace '\n','%0A' -replace '\r','%0D'
          echo "NOTES=$notes" >> $env:GITHUB_OUTPUT
        } else {
          echo "NOTES=Release $version" >> $env:GITHUB_OUTPUT
        }

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: Release ${{ steps.tag_name.outputs.TAG }}
        body: ${{ steps.extract_notes.outputs.NOTES }}
        files: |
          ecmabasic55-win-x64.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
